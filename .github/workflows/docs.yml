name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - package.json
      - package-lock.json
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - docs/**
      - package.json
      - package-lock.json
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          set -euo pipefail
          node -v
          npm -v
          if ! npm ci --no-fund --no-audit >npm-ci.out 2>npm-ci.err; then
            echo "::error title=npm ci failed::$(tr '\n' ' ' < npm-ci.err | head -c 1800)"
            echo "---- npm ci stdout ----"
            cat npm-ci.out || true
            echo "---- npm ci stderr ----"
            cat npm-ci.err || true
            echo "Falling back to npm install..."
            npm install --no-fund --no-audit
          fi

      - name: Setup Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Build docs
        run: npm run docs:build
        env:
          VITEPRESS_BASE: /${{ github.event.repository.name }}/

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
