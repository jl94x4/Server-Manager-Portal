name: Publish Docker image

on:
  push:
    branches: [main, beta, testing]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Avoid docker/metadata-action — it calls the GitHub API and has been
      # failing with intermittent Unicorn/500 HTML errors on branch pushes.
      - name: Set image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/jl94x4/server-manager-portal"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          TAGS=("${IMAGE}:sha-${SHA_SHORT}")

          case "${GITHUB_REF}" in
            refs/heads/main)
              TAGS+=("${IMAGE}:latest")
              ;;
            refs/heads/beta)
              TAGS+=("${IMAGE}:beta")
              ;;
            refs/heads/testing)
              TAGS+=("${IMAGE}:testing")
              ;;
            refs/tags/v*)
              VERSION="${GITHUB_REF#refs/tags/}"
              TAGS+=("${IMAGE}:${VERSION}" "${IMAGE}:latest")
              # Also tag without leading v when present (v1.2.3 -> 1.2.3)
              if [[ "${VERSION}" == v* ]]; then
                TAGS+=("${IMAGE}:${VERSION#v}")
              fi
              ;;
          esac

          {
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

          echo "Image tags:"
          printf '  - %s\n' "${TAGS[@]}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # GHCR often fails with "unknown blob" when BuildKit attaches
          # OCI provenance/SBOM attestations to the pushed index.
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          # Unraid Docker update checks report "not available" for OCI-only
          # manifests; publish Docker Schema 2 media types instead.
          outputs: type=image,push=true,oci-mediatypes=false
          build-args: |
            GIT_SHA=${{ github.sha }}
            GITHUB_REF=${{ github.ref }}
