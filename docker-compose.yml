services:
  portal:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-local}
    image: server-manager-portal:latest
    container_name: server-manager-portal
    restart: unless-stopped
    ports:
      - "${PORT:-2121}:2121"
    env_file:
      - .env
    environment:
      PORT: 2121
      BIND_HOST: 0.0.0.0
      CONFIG_DIR: /app/config
      PLEX_PREFER_REMOTE_CONNECTION: "true"
      # Collexions worker is bundled in the portal image (enable in Settings → Collexions).
      COLLEXIONS_EMBEDDED_PORT: ${COLLEXIONS_EMBEDDED_PORT:-15755}
    volumes:
      - ./config:/app/config
      - ./backup:/app/backup
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:2121/api/config/public').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
