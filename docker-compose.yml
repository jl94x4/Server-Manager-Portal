services:
  portal:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-local}
    image: server-manager-portal:latest
    container_name: server-manager-portal
    restart: unless-stopped
    ports:
      - "${PORT:-2121}:2121"
    env_file:
      - .env
    environment:
      PORT: 2121
      BIND_HOST: 0.0.0.0
      CONFIG_DIR: /app/config
      PLEX_PREFER_REMOTE_CONNECTION: "true"
      # Optional: same value as Collexions sidecar (or set in Settings → Collexions)
      COLLEXIONS_SERVICE_KEY: ${COLLEXIONS_SERVICE_KEY:-}
    volumes:
      - ./config:/app/config
      - ./backup:/app/backup
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:2121/api/config/public').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # Optional Collexions sidecar (admin collections manager). Enable in Settings → Collexions
  # with Internal URL http://collexions:5000 and matching service key.
  # Builds from ColleXions-WebUI-main so portal service-key / PORTAL_MODE patches are included.
  collexions:
    profiles: ["collexions"]
    build:
      context: ./ColleXions-WebUI-main
    image: collexions-portal-sidecar:local
    container_name: collexions
    restart: unless-stopped
    # No host port required when only the portal proxies to it.
    expose:
      - "5000"
    volumes:
      - ./collexions-config:/app/config
      - ./collexions-logs:/app/logs
    environment:
      COLLEXIONS_SECRET_KEY: ${COLLEXIONS_SECRET_KEY:-change-me-to-a-long-random-secret}
      COLLEXIONS_SERVICE_KEY: ${COLLEXIONS_SERVICE_KEY:-}
      COLLEXIONS_PORTAL_MODE: "true"
      COLLEXIONS_AUTOSTART: "true"
